services:
  postgres:
    image: postgres:16-alpine
    container_name: paramext-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-paramext}
      POSTGRES_USER: ${POSTGRES_USER:-paramext}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-paramext}
    # ports:  # No external port publishing
    #   - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-paramext} -d ${POSTGRES_DB:-paramext}"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./python
      dockerfile: Dockerfile
    container_name: paramext-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${POSTGRES_DB:-paramext}
      DATABASE_USER: ${POSTGRES_USER:-paramext}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-paramext}
      DATABASE_MIN_CONNECTIONS: ${DATABASE_MIN_CONNECTIONS:-4}
      DATABASE_MAX_CONNECTIONS: ${DATABASE_MAX_CONNECTIONS:-40}
      API_BEARER_TOKEN: ${API_BEARER_TOKEN:-}
      API_TOKEN: ${API_TOKEN:-}
      ADMIN_TOKEN: ${ADMIN_TOKEN:-changeme-admin-token}
      ADMIN_SECRET_KEY: ${ADMIN_SECRET_KEY:-change-me-admin-secret}
      BOT_LINK: ${BOT_LINK:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      TELEGRAM_TOPIC_ID: ${TELEGRAM_TOPIC_ID:-0}
      TELEGRAM_PROXY_URL: ${TELEGRAM_PROXY_URL:-}
    # ports:  # No external port publishing
    #   - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 10s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
