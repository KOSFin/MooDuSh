<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Админ{% endblock %} - MooDuSh</title>
    <style>
        :root {
            --bg: #f4f6f8;
            --surface: #ffffff;
            --surface-soft: #f8fafc;
            --surface-tint: #eef6f3;
            --ink: #172033;
            --muted: #667085;
            --line: #dfe5ec;
            --line-soft: #edf2f7;
            --nav: #18212f;
            --nav-soft: #263244;
            --accent: #1f9d75;
            --accent-dark: #13795b;
            --danger: #b42318;
            --warning: #b7791f;
            --shadow: 0 10px 28px rgba(15,23,42,0.07);
        }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: Inter, "Segoe UI", Arial, sans-serif; background: var(--bg); color: var(--ink); }
        a { color: inherit; text-decoration-color: rgba(31,157,117,0.45); text-underline-offset: 3px; }
        .layout { min-height: 100vh; display: grid; grid-template-columns: 248px minmax(0, 1fr); }
        .sidebar { position: sticky; top: 0; height: 100vh; background: var(--nav); color: #f9fafb; padding: 20px 16px; display: flex; flex-direction: column; gap: 18px; }
        .brand { display: flex; align-items: center; gap: 10px; padding: 0 8px 16px; border-bottom: 1px solid rgba(255,255,255,0.12); }
        .brand-mark { width: 34px; height: 34px; border-radius: 8px; background: #24c08f; display: grid; place-items: center; font-weight: 900; color: #071b16; }
        .brand-title { font-weight: 800; line-height: 1.1; }
        .brand-subtitle { color: #9ca3af; font-size: 12px; margin-top: 2px; }
        .nav { display: grid; gap: 6px; }
        .nav a { text-decoration: none; color: #d1d5db; padding: 10px 11px; border-radius: 8px; font-size: 14px; font-weight: 650; display: flex; align-items: center; justify-content: space-between; }
        .nav a:hover, .nav a.active { color: #fff; background: var(--nav-soft); }
        .nav a.active::after { content: ""; width: 7px; height: 7px; border-radius: 50%; background: #24c08f; }
        .sidebar-footer { margin-top: auto; display: grid; gap: 10px; }
        .env { color: #a7f3d0; background: rgba(32,180,134,0.12); border: 1px solid rgba(32,180,134,0.25); border-radius: 8px; padding: 8px 10px; font-size: 12px; overflow-wrap: anywhere; }
        .logout-form { margin: 0; }
        .logout-btn { width: 100%; border: 1px solid rgba(255,255,255,0.14); background: transparent; color: #f9fafb; border-radius: 8px; padding: 9px 10px; cursor: pointer; font-weight: 700; }
        .logout-btn:hover { background: rgba(255,255,255,0.08); }
        .main { min-width: 0; }
        .topbar { position: sticky; top: 0; z-index: 20; min-height: 62px; background: rgba(255,255,255,0.92); backdrop-filter: blur(12px); border-bottom: 1px solid var(--line); display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 0 28px; }
        .topbar h1 { margin: 0; font-size: 18px; line-height: 1.25; }
        .topbar-note { color: var(--muted); font-size: 13px; text-align: right; }
        .shell { max-width: 1360px; margin: 0 auto; padding: 26px 28px 44px; }
        .section-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; margin-bottom: 16px; }
        .section-head h2 { margin: 0; font-size: 20px; line-height: 1.25; }
        .section-head p { margin: 6px 0 0; }
        .header-actions { display: inline-flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
        .text-muted { color: var(--muted); font-size: 12px; }
        .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(155px, 1fr)); gap: 12px; margin-bottom: 20px; }
        .card { border: 1px solid var(--line); border-radius: 8px; background: var(--surface); padding: 15px; box-shadow: 0 1px 2px rgba(15,23,42,0.04); }
        .card p { margin: 0; font-size: 12px; color: var(--muted); }
        .card h3 { margin: 7px 0 0; font-size: 26px; line-height: 1.05; letter-spacing: 0; }
        .grid-2 { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 16px; align-items: start; }
        .grid-2 > .panel:only-child { grid-column: 1 / -1; }
        .panel { background: var(--surface); border: 1px solid var(--line); border-radius: 8px; overflow: hidden; margin-bottom: 16px; box-shadow: 0 1px 2px rgba(15,23,42,0.035); }
        .panel-head { min-height: 50px; padding: 13px 15px; border-bottom: 1px solid var(--line-soft); display: flex; align-items: center; justify-content: space-between; gap: 12px; }
        .panel-head h2 { margin: 0; font-size: 15px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 11px 12px; border-bottom: 1px solid var(--line-soft); font-size: 13px; vertical-align: top; }
        th { background: var(--surface-soft); font-size: 11px; text-transform: uppercase; color: var(--muted); letter-spacing: 0.04em; }
        tr:last-child td { border-bottom: 0; }
        tr.row-link:hover td { background: #fbfcfd; }
        .cell-wrap { max-width: 560px; overflow-wrap: anywhere; }
        .question-list { display: grid; gap: 0; }
        .question-row { display: grid; grid-template-columns: minmax(0, 1fr) minmax(300px, auto); gap: 16px; padding: 14px 15px; border-bottom: 1px solid var(--line-soft); }
        .question-row:last-child { border-bottom: 0; }
        .question-row:hover { background: #fbfcfd; }
        .question-main { min-width: 0; display: grid; gap: 7px; }
        .question-prompt { font-size: 14px; line-height: 1.42; color: #172033; overflow-wrap: anywhere; word-break: normal; }
        .question-meta { display: flex; flex-wrap: wrap; gap: 8px 14px; color: var(--muted); font-size: 12px; }
        .admin-split-label { margin: 12px 8px 2px; color: #9ca3af; font-size: 11px; font-weight: 850; text-transform: uppercase; letter-spacing: 0.04em; }
        .tree-toolbar { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; padding: 12px 14px; border-bottom: 1px solid var(--line-soft); background: var(--surface-soft); }
        .tree-search { flex: 1 1 280px; min-width: 180px; border: 1px solid #cfd7e2; border-radius: 8px; padding: 9px 10px; font-size: 14px; color: var(--ink); background: #fff; }
        .tree { display: grid; gap: 10px; padding: 14px; }
        .tree-node { border: 1px solid var(--line); border-radius: 8px; background: var(--surface); overflow: hidden; }
        .tree-node + .tree-node { margin-top: 8px; }
        .tree-node summary { cursor: pointer; list-style: none; display: grid; grid-template-columns: 22px minmax(0, 1fr) auto; align-items: center; gap: 10px; padding: 12px 14px; }
        .tree-node summary::-webkit-details-marker { display: none; }
        .tree-node summary::before { content: "›"; width: 22px; height: 22px; border-radius: 7px; display: grid; place-items: center; color: var(--accent-dark); background: #e4f5ef; font-size: 18px; transform: rotate(0deg); transition: transform 120ms ease; }
        .tree-node[open] > summary::before { transform: rotate(90deg); }
        .tree-node summary:hover { background: #fbfcfd; }
        .tree-node-level-1 > summary { background: var(--surface-soft); }
        .tree-node-level-2 { margin-left: 14px; border-left: 3px solid #477ea7; }
        .tree-node-level-3 { margin-left: 18px; border-left: 3px solid var(--accent); background: #fbfefd; }
        .tree-title { display: block; font-weight: 850; overflow-wrap: anywhere; }
        .tree-meta { display: block; color: var(--muted); font-size: 12px; margin-top: 4px; overflow-wrap: anywhere; }
        .tree-content { display: grid; gap: 8px; padding: 10px 12px 12px; border-top: 1px solid var(--line-soft); }
        .tree-summary-main { min-width: 0; }
        .tree-summary-stats { display: flex; gap: 6px; flex-wrap: wrap; justify-content: flex-end; align-items: center; }
        .vertical-questions { display: grid; gap: 8px; }
        .compact-question { border: 1px solid var(--line); border-radius: 8px; background: var(--surface); padding: 11px; display: grid; gap: 9px; }
        .compact-question-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
        .compact-question-head .question-prompt { min-width: 0; }
        .answer-list { display: grid; gap: 6px; margin-top: 8px; }
        .answer-item { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 10px; padding: 8px; border: 1px solid var(--line); border-radius: 8px; background: #fbfdff; }
        .answer-text { overflow-wrap: anywhere; font-size: 13px; }
        .answer-stats { display: flex; gap: 6px; flex-wrap: wrap; justify-content: flex-end; }
        .question-test { font-weight: 750; text-decoration: none; color: #172033; }
        .question-test:hover { text-decoration: underline; }
        .metric-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(92px, 120px)); gap: 8px; align-content: start; justify-content: start; min-width: 0; }
        .metric { border: 1px solid var(--line); border-radius: 8px; background: #fff; padding: 8px 9px; }
        .metric span { display: block; color: var(--muted); font-size: 11px; line-height: 1.2; }
        .metric strong { display: block; margin-top: 3px; color: #172033; font-size: 16px; line-height: 1.1; }
        .badge { display: inline-flex; align-items: center; min-height: 22px; padding: 2px 8px; border-radius: 999px; font-size: 12px; font-weight: 700; }
        .badge-green { background: #dcfce7; color: #166534; }
        .badge-gray { background: #eef2f7; color: #475467; }
        .badge-amber { background: #fef3c7; color: #92400e; }
        .badge-blue { background: #e0f2fe; color: #075985; }
        .search-row { display: flex; gap: 8px; margin: 0 0 16px; }
        .search-input { flex: 1; max-width: 620px; border: 1px solid #cfd7e2; border-radius: 8px; padding: 9px 10px; font-size: 14px; color: #172033; background: #fff; }
        .btn { border: 1px solid var(--nav); border-radius: 8px; background: var(--nav); color: #fff; min-height: 36px; padding: 9px 13px; font-size: 13px; font-weight: 800; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; justify-content: center; gap: 7px; white-space: nowrap; }
        .btn:hover { filter: brightness(1.04); }
        .btn-secondary { background: #fff; color: #172033; border-color: #cfd7e2; }
        .btn-danger { background: var(--danger); border-color: var(--danger); color: #fff; }
        .btn-ghost { background: transparent; color: var(--ink); border-color: #cfd7e2; }
        .btn-small { padding: 6px 9px; font-size: 12px; }
        .btn-icon { width: 34px; padding: 0; font-size: 16px; }
        .inline-form { margin: 0; display: inline-flex; }
        .metric-action { grid-column: 1 / -1; margin: 0; display: flex; justify-content: flex-end; }
        .pagination { display: flex; flex-wrap: wrap; gap: 7px; margin: 16px 0 0; }
        .pagination a { min-width: 32px; text-align: center; padding: 6px 10px; border-radius: 8px; border: 1px solid #cfd7e2; text-decoration: none; font-size: 13px; background: #fff; }
        .pagination a.active { background: var(--nav); color: #fff; border-color: var(--nav); }
        .empty { padding: 18px; color: var(--muted); font-size: 13px; }
        .is-hidden { display: none !important; }
        @media (max-width: 860px) {
            .layout { grid-template-columns: 1fr; }
            .sidebar { position: static; height: auto; }
            .nav { grid-template-columns: repeat(2, minmax(0, 1fr)); }
            .topbar { padding: 0 18px; }
            .shell { padding: 18px; }
            .grid-2 { grid-template-columns: 1fr; }
            table { display: block; overflow-x: auto; }
            .question-row { grid-template-columns: 1fr; }
            .metric-grid { min-width: 0; grid-template-columns: repeat(2, minmax(0, 1fr)); }
            .tree-node summary { grid-template-columns: 22px minmax(0, 1fr); }
            .tree-summary-stats { grid-column: 2; justify-content: flex-start; }
            .tree-node-level-2, .tree-node-level-3 { margin-left: 0; }
            .compact-question-head { display: grid; }
            .header-actions, .section-head { justify-content: flex-start; }
            .section-head { display: grid; }
        }
    </style>
</head>
<body>
    <div class="layout">
        <aside class="sidebar">
            <div class="brand">
                <div class="brand-mark">p</div>
                <div>
                    <div class="brand-title">MooDuSh</div>
                    <div class="brand-subtitle">OpenEdu backend</div>
                </div>
            </div>
            <nav class="nav" aria-label="Навигация">
                <a href="/admin" class="{% if active_page == 'overview' %}active{% endif %}">Обзор</a>
                <a href="/admin/users" class="{% if active_page == 'users' %}active{% endif %}">Пользователи</a>
                <div class="admin-split-label">Новая OpenEdu V2</div>
                <a href="/admin/v2/courses" class="{% if active_page == 'v2_courses' %}active{% endif %}">Курсы V2</a>
                <div class="admin-split-label">Legacy база</div>
                <a href="/admin/tests" class="{% if active_page == 'tests' %}active{% endif %}">Тесты legacy</a>
                <a href="/admin/questions" class="{% if active_page == 'questions' %}active{% endif %}">Вопросы legacy</a>
            </nav>
            <div class="sidebar-footer">
                <div class="env">Окружение: {{ app_env }}</div>
                <form method="post" action="/admin/logout" class="logout-form">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                    <button type="submit" class="logout-btn">Выйти</button>
                </form>
            </div>
        </aside>
        <main class="main">
            <header class="topbar">
                <h1>{% block page_title %}Админ{% endblock %}</h1>
                <div class="topbar-note">Сессия защищена cookie и CSRF</div>
            </header>
            <div class="shell">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>
    {% block scripts %}{% endblock %}
</body>
</html>
