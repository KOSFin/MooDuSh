<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Админ{% endblock %} - MooDuSh</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; font-family: Inter, "Segoe UI", Arial, sans-serif; background: #f5f7fb; color: #172033; }
        a { color: inherit; }
        .layout { min-height: 100vh; display: grid; grid-template-columns: 232px minmax(0, 1fr); }
        .sidebar { background: #111827; color: #f9fafb; padding: 20px 16px; display: flex; flex-direction: column; gap: 18px; }
        .brand { display: flex; align-items: center; gap: 10px; padding: 0 8px 14px; border-bottom: 1px solid rgba(255,255,255,0.12); }
        .brand-mark { width: 30px; height: 30px; border-radius: 8px; background: #20b486; display: grid; place-items: center; font-weight: 800; color: #071b16; }
        .brand-title { font-weight: 800; line-height: 1.1; }
        .brand-subtitle { color: #9ca3af; font-size: 12px; margin-top: 2px; }
        .nav { display: grid; gap: 6px; }
        .nav a { text-decoration: none; color: #d1d5db; padding: 10px 11px; border-radius: 8px; font-size: 14px; font-weight: 650; }
        .nav a:hover, .nav a.active { color: #fff; background: #263244; }
        .sidebar-footer { margin-top: auto; display: grid; gap: 10px; }
        .env { color: #a7f3d0; background: rgba(32,180,134,0.12); border: 1px solid rgba(32,180,134,0.25); border-radius: 8px; padding: 8px 10px; font-size: 12px; overflow-wrap: anywhere; }
        .logout-form { margin: 0; }
        .logout-btn { width: 100%; border: 1px solid rgba(255,255,255,0.14); background: transparent; color: #f9fafb; border-radius: 8px; padding: 9px 10px; cursor: pointer; font-weight: 700; }
        .logout-btn:hover { background: rgba(255,255,255,0.08); }
        .main { min-width: 0; }
        .topbar { height: 58px; background: #fff; border-bottom: 1px solid #e5e7eb; display: flex; align-items: center; justify-content: space-between; padding: 0 28px; }
        .topbar h1 { margin: 0; font-size: 18px; }
        .topbar-note { color: #667085; font-size: 13px; }
        .shell { max-width: 1280px; margin: 0 auto; padding: 24px 28px 40px; }
        .section-head { display: flex; align-items: end; justify-content: space-between; gap: 16px; margin-bottom: 14px; }
        .section-head h2 { margin: 0; font-size: 18px; }
        .header-actions { display: inline-flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
        .text-muted { color: #667085; font-size: 12px; }
        .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 12px; margin-bottom: 22px; }
        .card { border: 1px solid #e2e8f0; border-radius: 8px; background: #fff; padding: 15px; box-shadow: 0 1px 2px rgba(15,23,42,0.04); }
        .card p { margin: 0; font-size: 12px; color: #667085; }
        .card h3 { margin: 7px 0 0; font-size: 24px; letter-spacing: 0; }
        .grid-2 { display: grid; grid-template-columns: minmax(0, 1fr) minmax(320px, 0.42fr); gap: 16px; align-items: start; }
        .panel { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; overflow: hidden; margin-bottom: 16px; }
        .panel-head { padding: 13px 15px; border-bottom: 1px solid #edf2f7; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
        .panel-head h2 { margin: 0; font-size: 15px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid #edf2f7; font-size: 13px; vertical-align: top; }
        th { background: #f8fafc; font-size: 11px; text-transform: uppercase; color: #667085; letter-spacing: 0.04em; }
        tr:last-child td { border-bottom: 0; }
        tr.row-link:hover td { background: #fafafa; }
        .cell-wrap { max-width: 560px; overflow-wrap: anywhere; }
        .question-list { display: grid; gap: 0; }
        .question-row { display: grid; grid-template-columns: minmax(0, 1fr); gap: 12px; padding: 14px 15px; border-bottom: 1px solid #edf2f7; }
        .question-row:last-child { border-bottom: 0; }
        .question-row:hover { background: #fafafa; }
        .question-main { min-width: 0; display: grid; gap: 7px; }
        .question-prompt { font-size: 14px; line-height: 1.42; color: #172033; overflow-wrap: anywhere; word-break: normal; }
        .question-meta { display: flex; flex-wrap: wrap; gap: 8px 14px; color: #667085; font-size: 12px; }
        .admin-split-label { margin: 12px 8px 2px; color: #9ca3af; font-size: 11px; font-weight: 850; text-transform: uppercase; letter-spacing: 0.04em; }
        .tree { display: grid; gap: 10px; padding: 14px; }
        .tree-chapter { border: 1px solid #e2e8f0; border-radius: 8px; background: #fff; overflow: hidden; }
        .tree-chapter-head { padding: 12px 14px; background: #f8fafc; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; gap: 12px; }
        .tree-title { font-weight: 850; overflow-wrap: anywhere; }
        .tree-meta { color: #667085; font-size: 12px; margin-top: 4px; overflow-wrap: anywhere; }
        .tree-body { display: grid; gap: 8px; padding: 12px; }
        .tree-seq { border-left: 3px solid #2563eb; padding-left: 10px; display: grid; gap: 7px; }
        .tree-vertical { display: grid; grid-template-columns: minmax(0, 1fr) auto auto; gap: 10px; align-items: center; padding: 8px 10px; border: 1px solid #edf2f7; border-radius: 8px; background: #fbfdff; }
        .answer-list { display: grid; gap: 6px; margin-top: 8px; }
        .answer-item { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 10px; padding: 8px; border: 1px solid #e2e8f0; border-radius: 8px; background: #fbfdff; }
        .answer-text { overflow-wrap: anywhere; font-size: 13px; }
        .answer-stats { display: flex; gap: 6px; flex-wrap: wrap; justify-content: flex-end; }
        .question-test { font-weight: 750; text-decoration: none; color: #172033; }
        .question-test:hover { text-decoration: underline; }
        .metric-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(92px, 120px)); gap: 8px; align-content: start; justify-content: start; min-width: 0; }
        .metric { border: 1px solid #e2e8f0; border-radius: 8px; background: #fff; padding: 8px 9px; }
        .metric span { display: block; color: #667085; font-size: 11px; line-height: 1.2; }
        .metric strong { display: block; margin-top: 3px; color: #172033; font-size: 16px; line-height: 1.1; }
        .badge { display: inline-flex; align-items: center; min-height: 22px; padding: 2px 8px; border-radius: 999px; font-size: 12px; font-weight: 700; }
        .badge-green { background: #dcfce7; color: #166534; }
        .badge-gray { background: #eef2f7; color: #475467; }
        .badge-amber { background: #fef3c7; color: #92400e; }
        .search-row { display: flex; gap: 8px; margin: 0 0 16px; }
        .search-input { flex: 1; max-width: 620px; border: 1px solid #d0d5dd; border-radius: 8px; padding: 9px 10px; font-size: 14px; color: #172033; background: #fff; }
        .btn { border: 1px solid #111827; border-radius: 8px; background: #111827; color: #fff; padding: 9px 13px; font-size: 13px; font-weight: 800; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; justify-content: center; }
        .btn-secondary { background: #fff; color: #172033; border-color: #d0d5dd; }
        .btn-danger { background: #b42318; border-color: #b42318; color: #fff; }
        .btn-small { padding: 6px 9px; font-size: 12px; }
        .inline-form { margin: 0; display: inline-flex; }
        .metric-action { grid-column: 1 / -1; margin: 0; display: flex; justify-content: flex-end; }
        .pagination { display: flex; flex-wrap: wrap; gap: 7px; margin: 16px 0 0; }
        .pagination a { min-width: 32px; text-align: center; padding: 6px 10px; border-radius: 8px; border: 1px solid #d0d5dd; text-decoration: none; font-size: 13px; background: #fff; }
        .pagination a.active { background: #111827; color: #fff; border-color: #111827; }
        .empty { padding: 18px; color: #667085; font-size: 13px; }
        @media (max-width: 860px) {
            .layout { grid-template-columns: 1fr; }
            .sidebar { position: static; }
            .nav { grid-template-columns: repeat(2, minmax(0, 1fr)); }
            .topbar { padding: 0 18px; }
            .shell { padding: 18px; }
            .grid-2 { grid-template-columns: 1fr; }
            table { display: block; overflow-x: auto; }
            .question-row { grid-template-columns: 1fr; }
            .metric-grid { min-width: 0; grid-template-columns: repeat(2, minmax(0, 1fr)); }
        }
    </style>
</head>
<body>
    <div class="layout">
        <aside class="sidebar">
            <div class="brand">
                <div class="brand-mark">p</div>
                <div>
                    <div class="brand-title">MooDuSh</div>
                    <div class="brand-subtitle">OpenEdu backend</div>
                </div>
            </div>
            <nav class="nav" aria-label="Навигация">
                <a href="/admin" class="{% if active_page == 'overview' %}active{% endif %}">Обзор</a>
                <a href="/admin/users" class="{% if active_page == 'users' %}active{% endif %}">Пользователи</a>
                <div class="admin-split-label">Новая OpenEdu V2</div>
                <a href="/admin/v2/courses" class="{% if active_page == 'v2_courses' %}active{% endif %}">Курсы V2</a>
                <div class="admin-split-label">Legacy база</div>
                <a href="/admin/tests" class="{% if active_page == 'tests' %}active{% endif %}">Тесты legacy</a>
                <a href="/admin/questions" class="{% if active_page == 'questions' %}active{% endif %}">Вопросы legacy</a>
            </nav>
            <div class="sidebar-footer">
                <div class="env">Окружение: {{ app_env }}</div>
                <form method="post" action="/admin/logout" class="logout-form">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                    <button type="submit" class="logout-btn">Выйти</button>
                </form>
            </div>
        </aside>
        <main class="main">
            <header class="topbar">
                <h1>{% block page_title %}Админ{% endblock %}</h1>
                <div class="topbar-note">Сессия защищена cookie и CSRF</div>
            </header>
            <div class="shell">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>
</body>
</html>
